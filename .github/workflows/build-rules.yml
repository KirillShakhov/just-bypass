name: build-rules

on:
  push:
    branches: [main]
    paths:
      - "vpn/**/*.lst"
      - "zapret/**/*.lst"
      - "scripts/build-rules.py"
      - ".github/workflows/build-rules.yml"
  pull_request:
    paths:
      - "vpn/**/*.lst"
      - "zapret/**/*.lst"
      - "scripts/build-rules.py"
      - ".github/workflows/build-rules.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python scripts/build-rules.py
      - name: Validate generated JSON
        run: |
          python -m json.tool build/all-domains.json >/dev/null
          python -m json.tool build/all-ips.json >/dev/null
          python -m json.tool build/vpn-domains.json >/dev/null
          python -m json.tool build/vpn-ips.json >/dev/null
          python -m json.tool build/zapret-domains.json >/dev/null
          python -m json.tool build/zapret-ips.json >/dev/null
      - name: Publish packages branch
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          tmp_dir="$(mktemp -d)"
          cp -R build/. "$tmp_dir/"
          git fetch origin packages || true
          git switch --orphan packages
          if [ -n "$(git ls-files)" ]; then
            git rm -rf .
          fi
          cp -R "$tmp_dir/." .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update generated packages"
          git push -f origin packages
